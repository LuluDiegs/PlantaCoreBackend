name: Auto PR para Main

on:
  push:
    branches:
      - dev

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Instalar GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Verificar PR existente
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --base main --head dev --state open --json number --jq '.[0].number')

          if [ "$PR_NUMBER" != "null" ] && [ -n "$PR_NUMBER" ]; then
            echo "pr_exists=true" >> $GITHUB_OUTPUT
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          else
            echo "pr_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Criar novo PR
        if: steps.check.outputs.pr_exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head dev \
            --title "Merge dev → main" \
            --body "## Pull Request Automático

Ultimo commit: ${{ github.event.head_commit.message }}
Autor: ${{ github.event.head_commit.author.name }}
Data: $(date)

### Checklist

- [ ] Codigo revisado
- [ ] Migrations verificadas
- [ ] Testes passando

---

PR criado automaticamente pelo workflow."

      - name: Atualizar PR existente
        if: steps.check.outputs.pr_exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ steps.check.outputs.pr_number }} --body "**Nova atualização detectada**

Commit: ${{ github.event.head_commit.message }}
Autor: ${{ github.event.head_commit.author.name }}
Data: $(date)"